name: npm-publish

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  eslint-config:
    runs-on: ubuntu-slim
    environment:
      name: npm
      url: https://www.npmjs.com/package/@amezin/eslint-config-js-actions

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: test "$GITHUB_REF_NAME" = "v$(jq -r .version package.json)"
        working-directory: packages/eslint-config

      - run: npm publish --provenance --access public
        working-directory: packages/eslint-config

  octokit:
    runs-on: ubuntu-slim
    environment:
      name: npm
      url: https://www.npmjs.com/package/@amezin/js-actions-octokit

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: npm ci --workspace packages/octokit
      - run: npm run build --workspace packages/octokit

      - run: test "$GITHUB_REF_NAME" = "v$(jq -r .version package.json)"
        working-directory: packages/octokit

      - run: npm publish --provenance --access public
        working-directory: packages/octokit
