name: shared-codeql

on:
  - workflow_call

defaults:
  run:
    shell: bash

permissions:
  contents: read
  security-events: write

jobs:
  codeql-analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - actions

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          config: |
            paths-ignore:
              - dist

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:${{matrix.language}}'

  zizmor:
    runs-on: ubuntu-slim
    env:
      # renovate: datasource=github-releases depName=zizmorcore/zizmor
      ZIZMOR_VERSION: 1.25.2

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - working-directory: ${{ runner.temp }}
        run: |
          wget "https://github.com/zizmorcore/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz"
          mkdir zizmor
          tar -C zizmor -xf zizmor-x86_64-unknown-linux-gnu.tar.gz
          echo "$(pwd)/zizmor" >>"$GITHUB_PATH"

      - run: zizmor --format=sarif . >"$RUNNER_TEMP/results.sarif"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ runner.temp }}/results.sarif
          category: zizmor
