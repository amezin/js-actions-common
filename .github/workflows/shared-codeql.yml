name: shared-codeql

on:
  - workflow_call

defaults:
  run:
    shell: bash

permissions:
  contents: read
  security-events: write

jobs:
  codeql-analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - actions

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config: |
            paths-ignore:
              - dist

      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: '/language:${{matrix.language}}'

  zizmor:
    runs-on: ubuntu-slim
    env:
      # renovate: datasource=github-releases depName=zizmorcore/zizmor
      ZIZMOR_VERSION: 1.26.1

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - working-directory: ${{ runner.temp }}
        run: |
          wget "https://github.com/zizmorcore/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz"
          mkdir zizmor
          tar -C zizmor -xf zizmor-x86_64-unknown-linux-gnu.tar.gz
          echo "$(pwd)/zizmor" >>"$GITHUB_PATH"

      - run: zizmor --format=sarif . >"$RUNNER_TEMP/results.sarif"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: ${{ runner.temp }}/results.sarif
          category: zizmor
